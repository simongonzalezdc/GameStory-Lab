version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: gameforge-postgres
    environment:
      POSTGRES_USER: gameforge
      POSTGRES_PASSWORD: gameforge_dev_password
      POSTGRES_DB: gameforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gameforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
