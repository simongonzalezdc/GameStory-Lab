name: Lint Code Base

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  run-lint:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run native lint checks
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package.json ]]; then
            if [[ -f package-lock.json ]]; then npm ci; else npm install; fi
            npm run lint --if-present
            npm test --if-present
          elif [[ -f requirements.txt ]]; then
            python3 -m pip install -r requirements.txt
            python3 -m compileall .
          else
            git ls-files | grep -Ev '^(\.git|node_modules|dist|build)/' >/dev/null
            echo "No package manifest found; repository checkout is valid."
          fi
